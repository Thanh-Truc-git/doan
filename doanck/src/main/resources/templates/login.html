<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
        (function () {
            const theme = localStorage.getItem('bhtnex_theme') === 'light' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap</title>
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body class="auth-page">
<div class="auth-shell">
    <div class="auth-card" data-reveal>
        <div class="auth-brand">
            <span class="eyebrow">BHTNex Cinema</span>
            <h1 class="auth-title">Đăng nhập</h1>
            <p class="auth-subtitle">Vé trong tay – Phim hay mỗi ngày</p>
        </div>

        <div class="alert error" th:if="${param.error}">Sai tên tài khoản hoặc mật khẩu.</div>

        <form method="post" action="/login" class="field-grid">
            <div class="full field">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Nhập Username" required>
            </div>
            <div class="full field">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Nhập Mật Khẩu" required>
            </div>
            <div class="full stack-actions">
                <button class="btn" type="submit">Đăng Nhập</button>
            </div>
        </form>

        <p class="auth-footer">Chưa có tài khoản? <a th:href="@{/register}"><strong>Đăng Ký Ngay</strong></a></p>
    </div>
</div>
</body>
</html>
