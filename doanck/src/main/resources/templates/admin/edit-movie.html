<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Edit Movie</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<a href="/admin/dashboard" style="position:fixed;top:20px;right:20px;padding:10px 14px;background:#374151;color:#fff;text-decoration:none;border-radius:10px;z-index:9999;">Dashboard</a>

<div class="container">
    <h2>Edit Movie Details</h2>

    <div th:if="${successMessage}" style="margin-bottom:12px;padding:10px 12px;border-radius:8px;background:#14532d;color:#dcfce7;" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" style="margin-bottom:12px;padding:10px 12px;border-radius:8px;background:#7f1d1d;color:#fee2e2;" th:text="${errorMessage}"></div>

    <form th:action="@{/admin/movies/save}" th:object="${movie}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Movie Title</label>
            <input type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}"></textarea>
        </div>

        <div class="form-group">
            <label>Duration (minutes)</label>
            <input type="number" th:field="*{duration}">
        </div>

        <div class="form-group">
            <label>Genre</label>
            <input type="text" th:field="*{genre}">
        </div>

        <div class="form-group">
            <label>Poster image</label>
            <input type="file" th:field="*{posterFile}">
            <input type="hidden" th:field="*{poster}">
        </div>

        <div class="form-group">
            <label>Trailer URL</label>
            <input type="text" th:field="*{trailerUrl}" placeholder="https://youtube.com/...">
        </div>

        <div class="form-group">
            <label>Show Date (optional)</label>
            <input type="date" name="showDate" th:value="${showtime != null && showtime.startTime != null ? #temporals.format(showtime.startTime, 'yyyy-MM-dd') : ''}">
        </div>

        <div class="form-group">
            <label>Show Time (optional)</label>
            <input type="time" name="showTime" th:value="${showtime != null && showtime.startTime != null ? #temporals.format(showtime.startTime, 'HH:mm') : ''}">
        </div>

        <div class="form-group">
            <label>Room (optional)</label>
            <select name="roomId">
                <option value="">-- Keep current / select later --</option>
                <option th:each="room : ${rooms}" th:value="${room.id}" th:text="${room.name}" th:selected="${showtime != null && showtime.room != null && showtime.room.id == room.id}"></option>
            </select>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-save">Update Movie</button>
            <a href="/admin/movies" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
