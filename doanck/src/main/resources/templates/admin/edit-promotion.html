<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Khuyến mãi</title>
    <style>
        body{font-family:Arial,sans-serif;background:#121212;color:#fff;margin:0;padding:20px}
        form{max-width:700px;margin:auto;background:#1f1f1f;padding:20px;border-radius:14px}
        input,textarea{width:100%;padding:10px;margin-top:6px;margin-bottom:14px;border-radius:8px;border:1px solid #333;background:#111;color:#fff}
        button,a{padding:10px 14px;border:none;border-radius:8px;text-decoration:none;display:inline-block}
        button{background:#2563eb;color:#fff}.back{background:#374151;color:#fff}
    </style>
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<a href="/admin/dashboard" style="position:fixed;top:20px;right:20px;padding:10px 14px;background:#374151;color:#fff;text-decoration:none;border-radius:10px;z-index:9999;">Dashboard</a>
<form th:action="@{/admin/promotions/save}" th:object="${promotion}" method="post">
    <h2>Sửa khuyến mãi</h2>
    <input type="hidden" th:field="*{id}">
    <label>Mã khuyến mãi</label>
    <input type="text" th:field="*{code}" required>
    <label>Mô tả</label>
    <textarea th:field="*{description}" rows="4"></textarea>
    <label>% giảm</label>
    <input type="number" step="0.01" th:field="*{discountPercent}">
    <label>Giảm tiền trực tiếp</label>
    <input type="number" step="0.01" th:field="*{discountAmount}">
    <label>Bắt đầu</label>
    <input type="datetime-local" name="startDate" th:value="${promotion.startDate != null ? #temporals.format(promotion.startDate, 'yyyy-MM-dd''T''HH:mm') : ''}">
    <label>Kết thúc</label>
    <input type="datetime-local" name="endDate" th:value="${promotion.endDate != null ? #temporals.format(promotion.endDate, 'yyyy-MM-dd''T''HH:mm') : ''}">
    <label>Giới hạn sử dụng</label>
    <input type="number" th:field="*{usageLimit}">
    <label><input type="checkbox" th:field="*{active}"> Hoạt động</label>
    <div style="margin-top:16px">
        <button type="submit">Cập nhật khuyến mãi</button>
        <a class="back" href="/admin/promotions">Quay lại</a>
    </div>
</form>
</body>
</html>
