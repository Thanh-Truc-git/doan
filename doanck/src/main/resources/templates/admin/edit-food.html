<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Edit Food & Drink</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: #1a1a1a; padding: 40px; border-radius: 15px; border: 1px solid #333; width: 100%; max-width: 500px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        h2 { color: #fd7e14; border-left: 5px solid #fd7e14; padding-left: 15px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: #bbb; font-weight: 600; font-size: 14px; }

        input[type="text"], input[type="number"], select {
            width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, select:focus { border-color: #fd7e14; outline: none; box-shadow: 0 0 8px rgba(253, 126, 20, 0.3); }

        .image-preview { margin: 15px 0; display: flex; align-items: center; gap: 20px; background: #252525; padding: 10px; border-radius: 10px; }
        .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #444; }
        .image-text { font-size: 12px; color: #777; }

        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn-save { flex: 2; background: #fd7e14; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-save:hover { background: #e66d0a; transform: translateY(-2px); }
        .btn-cancel { flex: 1; background: #444; color: white; text-align: center; text-decoration: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .btn-cancel:hover { background: #555; }
    </style>
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<a href="/admin/dashboard" style="position:fixed;top:20px;right:20px;padding:10px 14px;background:#374151;color:#fff;text-decoration:none;border-radius:10px;z-index:9999;">Dashboard</a>

<div class="form-container">
    <h2>Edit Food Item</h2>

    <form th:action="@{/admin/foods/save}" th:object="${food}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Food / Drink Name</label>
            <input type="text" th:field="*{name}" placeholder="Nháº­p tĂªn mĂ³n Äƒn..." required>
        </div>

        <div class="form-group">
            <label>Price (VNÄ)</label>
            <input type="number" th:field="*{price}" placeholder="VĂ­ dá»¥: 55000" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="categoryId" required>
                <option value="" disabled>-- Select Category --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${food.category != null && cat.id == food.category.id}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Current Image</label>
            <div class="image-preview">
                <img th:if="${food.image != null}" th:src="@{'/uploads/' + ${food.image}}" alt="current">
                <img th:if="${food.image == null}" th:src="@{/images/default-food.png}" alt="default">
                <div class="image-text">
                    <p style="margin: 0;">File hiá»‡n táº¡i: <span th:text="${food.image}">image.png</span></p>
                    <p style="margin: 5px 0 0 0; font-style: italic;">Äá»ƒ trá»‘ng náº¿u khĂ´ng muá»‘n Ä‘á»•i áº£nh.</p>
                </div>
            </div>
            <label>Upload New Image (Optional)</label>
            <input type="file" name="imageFile" accept="image/png, image/jpeg">
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-save">Update Changes</button>
            <a th:href="@{/admin/foods}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
