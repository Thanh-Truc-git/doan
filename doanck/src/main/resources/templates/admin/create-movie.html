<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Movie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .card{
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .preview{
            width:200px;
            height:300px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #ddd;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card p-4">

                <h2 class="text-center mb-4">🎬 Add New Movie</h2>

                <form th:action="@{/admin/movies/save}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Movie Title</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Poster Image</label>
                        <input type="file"
                               class="form-control"
                               name="posterFile"
                               accept="image/*"
                               onchange="previewImage(event)">
                    </div>

                    <div class="text-center mb-3">

                        <img id="posterPreview"
                             src="https://via.placeholder.com/200x300?text=Poster"
                             class="preview">

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Trailer Youtube URL</label>
                        <input type="text" class="form-control" name="trailerUrl" placeholder="https://youtube.com/...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Duration (minutes)</label>
                        <input type="number" class="form-control" name="duration">
                    </div>

                    <div class="d-grid gap-2">

                        <button type="submit" class="btn btn-primary">
                            💾 Save Movie
                        </button>

                        <a th:href="@{/admin/movies}" class="btn btn-secondary">
                            ⬅ Back
                        </a>

                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script>

    function previewImage(event){

        const file = event.target.files[0];

        if(file){

            const reader = new FileReader();

            reader.onload = function(e){
                document.getElementById("posterPreview").src = e.target.result;
            }

            reader.readAsDataURL(file);

        }
    }

</script>

</body>
</html>
