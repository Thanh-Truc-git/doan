<h2>Movies</h2>

<a href="/admin/movies/create">Add Movie</a>

<table>

    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Action</th>
    </tr>

    <tr th:each="movie : ${movies}">

        <td th:text="${movie.id}"></td>

        <td th:text="${movie.title}"></td>

        <td>

            <a th:href="@{/admin/movies/edit/{id}(id=${movie.id})}">Edit</a>

            <a th:href="@{/admin/movies/delete/{id}(id=${movie.id})}">Delete</a>

        </td>

    </tr>

</table>
