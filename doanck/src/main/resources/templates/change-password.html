<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
        (function () {
            const theme = localStorage.getItem('bhtnex_theme') === 'light' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Doi mat khau</title>
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<div class="account-shell section-stack">
    <section class="surface-panel form-shell" data-reveal>
        <div class="page-header">
            <div>
                <span class="eyebrow">Security</span>
                <h1 class="section-title">Doi mat khau</h1>
            </div>
            <a class="btn ghost" th:href="@{/settings}">Quay lai cai dat</a>
        </div>
        <p class="section-text">Cap nhat mat khau de giu an toan cho tai khoan va toan bo lich su dat ve cua ban.</p>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/change-password}" method="post" class="field-grid">
            <div class="full field">
                <label for="currentPassword">Mat khau hien tai</label>
                <input id="currentPassword" type="password" name="currentPassword" required>
            </div>
            <div class="field">
                <label for="newPassword">Mat khau moi</label>
                <input id="newPassword" type="password" name="newPassword" required>
            </div>
            <div class="field">
                <label for="confirmPassword">Xac nhan mat khau moi</label>
                <input id="confirmPassword" type="password" name="confirmPassword" required>
            </div>
            <div class="full stack-actions">
                <button class="btn" type="submit">Cap nhat mat khau</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
