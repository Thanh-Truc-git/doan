<!DOCTYPE html>
<html lang="vi">
<head>
    <script>
        (function () {
            const theme = localStorage.getItem('bhtnex_theme') === 'light' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang ky</title>
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body class="auth-page">
<div class="auth-shell">
    <div class="auth-card" data-reveal>
        <div class="auth-brand">
            <span class="eyebrow">Membership</span>
            <h1 class="auth-title">Tạo tài khoản để giữ cho mình một hàng ghế đẹp</h1>
            <p class="auth-subtitle">Đăng ký một lần để đặt vé nhanh, lưu ưu đãi về vé phim và combo bắp nước.</p>
        </div>

        <form action="/auth/register" method="post" class="field-grid">
            <div class="full field">
                <label for="username">Tên</label>
                <input id="username" type="text" name="username" placeholder="Nhập Username" required>
            </div>
            <div class="full field">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="Nhập Email" required>
            </div>
            <div class="full field">
                <label for="password">Password</label>
                <input id="password" type="password" name="Mật Khẩu" placeholder="Nhập Mật Khẩu" required>
            </div>
            <div class="full stack-actions">
                <button class="btn" type="submit">Đăng Ký Tài Khoản</button>
            </div>
        </form>

        <p class="auth-footer">Đã có tài khoản? <a href="/login"><strong>Đăng nhập</strong></a></p>
    </div>
</div>
</body>
</html>
