<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::body})">

<body>

<h2 style="text-align:center">PHIM ĐANG CHIẾU</h2>

<div class="movies">
    <div class="movie-card" th:each="movie : ${movies}">

        <img th:src="${movie.poster != null}
    ? @{/uploads/{img}(img=${movie.poster})}
    : 'https://via.placeholder.com/300x400'">

        <div class="overlay">

            <a th:href="@{/showtimes/movie/{id}(id=${movie.id})}">
                <button class="btn buy">Mua vé</button>
            </a>

            <button class="btn btn-danger watch-trailer"
                    th:data-url="${movie.trailerUrl}">
                ▶ Watch Trailer
            </button>
        </div>
    </div>
</div>

<script>

    document.addEventListener("DOMContentLoaded", function(){

        document.querySelectorAll(".watch-trailer").forEach(btn => {

            btn.addEventListener("click", function(){

                let url = this.dataset.url;

                url = convertYoutube(url);

                openTrailer(url);

            });

        });

    });

    function convertYoutube(url){

        // dạng watch?v=
        if(url.includes("watch?v=")){
            return url.replace("watch?v=","embed/");
        }

        // dạng youtube
        if(url.includes("youtu.be/")){

            let id = url.split("youtu.be/")[1];

            if(id.includes("?"))
                id = id.split("?")[0];

            return "https://www.youtube.com/embed/" + id;
        }

        return url;

    }

    function openTrailer(url){

        const modal = document.createElement("div");

        modal.style.position="fixed";
        modal.style.top="0";
        modal.style.left="0";
        modal.style.width="100%";
        modal.style.height="100%";
        modal.style.background="rgba(0,0,0,0.85)";
        modal.style.display="flex";
        modal.style.alignItems="center";
        modal.style.justifyContent="center";
        modal.style.zIndex="9999";

        modal.innerHTML=`
            <div style="width:900px;height:500px;background:black;border-radius:10px;overflow:hidden">
                <iframe width="100%" height="100%"
                    src="${url}"
                    frameborder="0"
                    allow="autoplay; encrypted-media"
                    allowfullscreen>
                </iframe>
            </div>
        `;

        document.body.appendChild(modal);

        modal.onclick = () => modal.remove();

    }

</script>

</script>
<style>
    .movies{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:30px;
    padding:40px;
    }

    .movie-card{
    position:relative;
    overflow:hidden;
    border-radius:12px;
    }

    .movie-card img{
    width:100%;
    height:350px;
    object-fit:cover;
    }

    .overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:0.3s;
    }

    .movie-card:hover .overlay{
    opacity:1;
    }

    .btn{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    }

    .buy{
    background:#ff6b00;
    color:white;
    }

    .trailer{
    background:white;
    }
</style>

</body>
</html>
