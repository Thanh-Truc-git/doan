<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::body})">

<head>

  <title th:text="${movie.title}">Movie Detail</title>

  <style>

    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f6f9;
        margin:0;
    }

    .container{
        max-width:1000px;
        margin:auto;
        padding:40px;
        display:flex;
        gap:40px;
    }

    .poster{
        width:260px;
        border-radius:12px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .info{
        flex:1;
    }

    h2{
        margin-top:0;
    }

    .description{
        margin:15px 0;
        line-height:1.6;
        color:#555;
    }

    .showtime{
        margin-top:30px;
    }

    .showtime-item{
        display:flex;
        align-items:center;
        justify-content:space-between;
        background:white;
        padding:12px 15px;
        border-radius:8px;
        margin-bottom:10px;
        box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .time{
        font-weight:bold;
        font-size:16px;
    }

    button{
        padding:8px 18px;
        background:#ff6b00;
        border:none;
        color:white;
        border-radius:6px;
        cursor:pointer;
        font-weight:bold;
    }

    button:hover{
        background:#ff8c2a;
    }

    .no-showtime{
        color:#888;
        margin-top:10px;
    }

  </style>

</head>

<body>

<div class="container">

  <!-- Poster -->
  <img th:src="${movie.poster != null}
    ? @{/uploads/{img}(img=${movie.poster})}
    : 'https://via.placeholder.com/300x400'">

  <!-- Info -->
  <div class="info">

    <h2 th:text="${movie.title}">Movie Title</h2>

    <p class="description" th:text="${movie.description}">
      Movie description
    </p>

    <!-- Showtime -->
    <div class="showtime">

      <h3>Lịch chiếu</h3>

      <!-- nếu có suất chiếu -->
      <div th:if="${#lists.size(showtimes) > 0}">

        <div th:each="showtime : ${showtimes}" class="showtime-item">

                    <span class="time"
                          th:text="${#temporals.format(showtime.startTime,'dd/MM/yyyy HH:mm')}">
                    </span>

          <a th:href="@{/seats/{id}(id=${showtime.id})}">
            <button>Chọn ghế</button>
          </a>

        </div>

      </div>

      <!-- nếu chưa có suất -->
      <div th:if="${#lists.isEmpty(showtimes)}" class="no-showtime">
        Chưa có suất chiếu cho phim này.
      </div>

    </div>

  </div>

</div>

</body>
</html>
