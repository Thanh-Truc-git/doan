<!DOCTYPE html>
<html>

<head>
  <title>QR Check-in</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Quét vé</h2>

<div id="reader" style="width:400px"></div>

<script>

  function onScanSuccess(code){

  fetch("/checkin/"+code)
  .then(r=>r.text())
  .then(msg=>alert(msg))

  }

  new Html5QrcodeScanner(
  "reader",
  {fps:10,qrbox:250}
  ).render(onScanSuccess)

</script>

</body>
</html>
