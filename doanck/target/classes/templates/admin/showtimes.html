<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suất chiếu</title>
    <style>
        body{font-family:Arial, sans-serif; background:#121212; color:#fff; margin:0; padding:20px;}
        h2{margin-top:0;}
        .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
        .actions{display:flex;gap:10px;flex-wrap:wrap;}
        .showtime-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px;}
        .showtime-card{background:#1f1f1f; padding:16px; border-radius:12px; display:flex; flex-direction:column; gap:12px; transition:0.2s;}
        .showtime-card:hover{background:#2a2a2a;}
        .movie-title{font-size:18px; font-weight:600;}
        .showtime-info{color:#aaa; font-size:14px;}
        .btn-primary{padding:8px 12px; border-radius:8px; border:none; background:#ff6b6b; color:#fff; cursor:pointer; transition:0.2s; text-decoration:none; display:inline-block; text-align:center;}
        .btn-primary:hover{opacity:0.9;}
        .btn-dark{background:#374151;}
        .btn-warning{background:#f59e0b;color:#111;}
        .btn-danger{background:#dc2626;}
        .empty{color:#aaa; padding:12px 0;}
    </style>
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<a href="/admin/dashboard" style="position:fixed;top:20px;right:20px;padding:10px 14px;background:#374151;color:#fff;text-decoration:none;border-radius:10px;z-index:9999;">Dashboard</a>
<h2>Danh sách suất chiếu</h2>
<div class="empty" th:if="${#lists.isEmpty(showtimes)}">Chưa có suất chiếu nào.</div>
<div class="showtime-grid" th:if="${!#lists.isEmpty(showtimes)}">
    <div class="showtime-card" th:each="showtime : ${showtimes}">
        <div class="movie-title" th:text="${showtime.movie != null ? showtime.movie.title : 'Chưa gán phim'}"></div>
        <div class="showtime-info">Phòng: <span th:text="${showtime.room != null ? showtime.room.name : 'Chưa gán phòng'}"></span></div>
        <div class="showtime-info">Thời gian: <span th:text="${showtime.startTime != null ? #temporals.format(showtime.startTime, 'yyyy-MM-dd HH:mm') : 'Chưa có lịch'}"></span></div>
        <a class="btn-primary" th:href="@{/seats/{id}(id=${showtime.id})}">Chọn suất chiếu</a>
    </div>
</div>
</body>
</html>
