<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phim</title>
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body class="admin-page">
<div class="admin-shell section-stack">
    <section class="surface-panel" data-reveal style="padding:28px;">
        <div class="page-header">
            <div>
                <span class="eyebrow">Quản lý danh mục</span>
                <h1 class="section-title">Danh sách phim</h1>
                <p class="section-text">
                    Không gian quản trị phim được tối ưu, tập trung vào poster, thao tác rõ ràng và đồng bộ với bảng điều khiển quản trị.
                </p>
            </div>
            <div class="toolbar-actions">
                <a class="btn" href="/admin/movies/create">Thêm phim</a>
                <a class="btn ghost" href="/admin/dashboard">Bảng điều khiển</a>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên phim</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="movie : ${movies}">
                    <td th:text="${movie.id}">1</td>
                    <td><strong th:text="${movie.title}">Tên phim</strong></td>
                    <td><span class="status-chip">Đang chiếu</span></td>
                    <td>
                        <div class="inline-actions">
                            <a class="btn ghost" th:href="@{/admin/movies/view/{id}(id=${movie.id})}">Xem</a>
                            <a class="btn ghost" th:href="@{/admin/showtimes}">Suất chiếu</a>
                            <a class="btn" th:href="@{/admin/movies/edit/{id}(id=${movie.id})}">Chỉnh sửa</a>
                            <a class="btn danger"
                               th:href="@{/admin/movies/delete/{id}(id=${movie.id})}"
                               onclick="return confirm('Bạn chắc chắn muốn xóa phim này?')">
                                Xóa
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
