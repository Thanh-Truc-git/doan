<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::body})">

<head>
    <title>My Tickets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg, #1c1c1c, #2c2c2c);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        h2{
            font-weight: bold;
            color: #ffc107;
        }

        /* CARD */
        .ticket-card{
            background: #fff;
            color: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .ticket-card:hover{
            transform: translateY(-5px) scale(1.02);
        }

        /* HEADER */
        .ticket-header{
            background: linear-gradient(45deg, #ff9800, #ffc107);
            padding: 12px;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
        }

        /* BODY */
        .ticket-body{
            padding: 20px;
        }

        /* POSTER */
        .movie-poster{
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        /* INFO */
        .ticket-info h5{
            font-weight: bold;
            margin-bottom: 10px;
        }

        .ticket-info p{
            margin: 5px 0;
            font-size: 14px;
        }

        .screen{
            color: gray;
            font-size: 13px;
        }

        /* SEATS */
        .seat-container{
            margin-top: 5px;
        }

        .seat-badge{
            display: inline-block;
            background: linear-gradient(45deg, #ff9800, #ffc107);
            color: #000;
            padding: 6px 10px;
            border-radius: 20px;
            margin: 3px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* QR */
        .qr-box{
            text-align: center;
        }

        .qr{
            width: 110px;
            border: 3px solid #ffc107;
            padding: 5px;
            border-radius: 10px;
            background: white;
        }

        .qr-text{
            font-size: 12px;
            margin-top: 5px;
            color: gray;
        }

        /* EMPTY */
        .empty-box{
            background: #fff;
            color: black;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">🎟 My Movie Tickets</h2>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(ticketsGrouped)}">
        <div class="empty-box">
            <h5>You have no tickets yet 😢</h5>
        </div>
    </div>

    <div class="row">

        <!-- GROUP -->
        <div class="col-md-6" th:each="group : ${ticketsGrouped}">

            <div class="ticket-card">

                <!-- HEADER -->
                <div class="ticket-header">
                    🎬 MOVIE TICKET
                </div>

                <!-- BODY -->
                <div class="ticket-body">

                    <div class="row align-items-center">

                        <!-- POSTER -->
                        <div class="col-4">
                            <img th:src="${group[0].showtime.movie.poster != null}
                                    ? '/uploads/' + ${group[0].showtime.movie.poster}
                                    : 'https://via.placeholder.com/300x400'">
                        </div>

                        <!-- INFO -->
                        <div class="col-5 ticket-info">

                            <h5 th:text="${group[0].showtime.movie.title}"></h5>

                            <p class="screen">
                                🎬 Room:
                                <span th:text="${group[0].showtime.room.name}"></span>
                            </p>

                            <p>
                                ⏰
                                <span th:text="${#temporals.format(group[0].showtime.startTime,'dd/MM/yyyy HH:mm')}"></span>
                            </p>

                            <!-- SEATS -->
                            <div class="seat-container">
                                💺 Seats:
                                <span th:each="t : ${group}"
                                      class="seat-badge"
                                      th:text="${t.seatNumber}">
                                </span>
                            </div>

                        </div>

                        <!-- QR -->
                        <div class="col-3 qr-box">

                            <img class="qr"
                                 th:src="${group[0].qrCode}">

                            <div class="qr-text">
                                Scan to check-in
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
